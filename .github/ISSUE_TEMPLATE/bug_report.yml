name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check the [existing issues](https://github.com/TigerTag-Project/TigerTag-SDK-JS/issues).

  - type: input
    id: version
    attributes:
      label: SDK version
      description: Output of `tigertag --version` or `node -e "console.log(require('tigertag/package.json').version)"`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.0.0"
    validations:
      required: true

  - type: dropdown
    id: tag_type
    attributes:
      label: Tag type
      options:
        - TigerTag (Maker)
        - TigerTag+
        - TigerTag Init
        - Unknown
    validations:
      required: false

  - type: dropdown
    id: input_method
    attributes:
      label: Input method
      options:
        - fromPages()
        - fromDump()
        - fromFile()
        - create() / patch()
        - diffApi() / patchFromApi()
        - CLI
        - Other
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Paste the smallest code snippet or CLI command that reproduces the issue.
      render: javascript
    validations:
      required: false

  - type: textarea
    id: traceback
    attributes:
      label: Error / stack trace
      render: text
    validations:
      required: false
