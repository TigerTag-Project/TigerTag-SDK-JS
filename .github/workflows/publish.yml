name: Publish to npm

# Triggers automatically when you push a version tag: git tag v1.0.2 && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC Trusted Publisher
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # No registry-url — prevents setup-node from writing _authToken into .npmrc,
          # which would shadow the OIDC token exchange performed by npm Trusted Publisher.

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Publish with provenance (OIDC Trusted Publisher — no token needed)
        # npm detects ACTIONS_ID_TOKEN_REQUEST_URL, exchanges the GitHub OIDC JWT for a
        # short-lived npm access token, and publishes. Trusted Publisher must be configured
        # on npmjs.com for TigerTag-Project/TigerTag-SDK-JS / publish.yml.
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          npm publish --access public --provenance
