name: Publish to npm

# Triggers automatically when you push a version tag: git tag v1.0.2 && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC Trusted Publisher
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # No registry-url: prevents setup-node from writing an _authToken line into
          # .npmrc, which would shadow the OIDC token exchange done by Trusted Publisher.

      - name: Upgrade npm to an OIDC-capable version
        # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships with npm 10.x.
        run: npm install -g npm@latest

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Publish with provenance (OIDC Trusted Publisher — no token needed)
        # npm exchanges the GitHub OIDC JWT for a short-lived npm token automatically.
        # Trusted Publisher must be configured on npmjs.com for
        # TigerTag-Project/TigerTag-SDK-JS / publish.yml.
        run: npm publish --access public --provenance
