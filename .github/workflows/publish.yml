name: Publish to npm

# Triggers automatically when you push a version tag: git tag v1.0.2 && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC — no NPM_TOKEN secret needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies (skip optional native modules)
        run: npm ci --omit=optional

      - name: Publish with provenance (OIDC Trusted Publisher)
        # NODE_AUTH_TOKEN must NOT be set (not even to empty string) so that npm
        # detects the GitHub OIDC environment and exchanges the token automatically.
        # Trusted Publisher is configured on npmjs.com for this repo + publish.yml.
        run: npm publish --access public --provenance
